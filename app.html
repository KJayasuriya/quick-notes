<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Notes App</title>
    <link rel="icon" src="assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>

<body>


    <section class="hero">
        <!--navbar -->
        <nav>
            <div class="brand">
                <img src="assets/logo.png" width="50px">
                <h1>NotesNest</h1>
            </div>
            <button class="add-btn">+</button>
            <button id="theme-toggle" class="theme-btn">
                🌙 Dark Mode
            </button>
            <a id="log-out-btn" href="index.html">Log out</a>
        </nav>

        <h1 id="greeting"></h1>

        <!-- Dialog message when there is no notes-->
        <div id="empty-notes">

            <h2>📚 Your nest is empty</h2>

            <p>Start collecting your study notes.
                Organize lectures, formulas, ideas, and reminders in one place.</p>

            <button class="first-create-btn">+ Create First Note</button>
        </div>

        <!-- Notes container -->
        <section class="content">
            <div class="notes-container">
            </div>
        </section>

        <!--Preloader animation-->
        <div id="preloader">
            <div class="loader">
                <div class="circle"></div>
                <div class="pencil">✏️</div>
                <h3> Loading..</h3>
            </div>
        </div>


        <!-- Form to create notes-->
        <dialog class="note-form" id="note-form">
            <div class="note-form-content">
                <input id="titleId" type="text" placeholder="Enter note title">
                <textarea id="notesId" placeholder="Write your notes"></textarea>
                <div class="CTA-form">
                    <button type="button" class="save-btn">Save</button>
                    <button type="button" class="cancel-btn">Cancel</button>
                </div>
            </div>
        </dialog>

    </section>

    <footer>
        @Codesmasher 2026 made with HTML, CSS and Vanilla JS
    </footer>
</body>

</html>
