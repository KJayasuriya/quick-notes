<html>

<head>
    <title>Home Page</title>
    <link rel="stylesheet" href="css/login.css">
    <script src='js/login.js' defer></script>
</head>

<body>
    <div class="hero">
        <button id="theme-toggle" class="theme-btn">
            🌙 Dark Mode
        </button>
        <div class='login-box'>
            <h1 style="font: bold;">NotesNest</h1>
            <h3>Capture. Organize. Succeed.</h3>
            <input id="nameId" type="text" placeholder="Email or Username">
            <input id="pwdId" type="password" placeholder="Password">
            <button class="login-btn" onclick="validate()">Log In</button>
            <div class="sign-up-section">
                <p>Don't have account?</p> <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>
</body>

</html>
