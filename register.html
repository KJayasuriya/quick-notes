<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up for NotesNest</title>
    <link rel="stylesheet" href="css/signup.css">
    <script src="js/login.js" defer></script>
</head>

<body>
    <div class="hero">
        <button id="theme-toggle" class="theme-btn">
            🌙 Dark Mode
        </button>
        <div class='sign-up-box'>
            <img src="assets/brand.png" width="150px">
            <h3>Capture. Organize. Succeed.</h3>
            <input id="nameId" type="text" placeholder="Email or Username">
            <input id="pwdId" type="password" placeholder="Set a Password">
            <input id="confirm-pwd" type="password" placeholder="confirm the new Password">
            <button class="sign-up-btn">Sign Up</button>
        </div>
    </div>
    </div>
</body>

</html>
