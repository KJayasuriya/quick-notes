<html>

<head>
    <title>Sign Up for Portfolio site</title>
    <link rel="stylesheet" href="css/signup.css">
    <script src="js/login.js" defer></script>
</head>

<body>
    <div class="hero">
        <button id="theme-toggle" class="theme-btn">
            🌙 Dark Mode
        </button>
        <div class='sign-up-box'>
            <h1 style="font: bold;">NotesNest</h1>

            <button class="sign-up-btn" onclick="validate()">Sign Up</button>
        </div>
    </div>
    </div>
