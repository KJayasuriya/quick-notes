<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login for NotesNest</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
</head>


<body>
    <div class="hero">
        <button id="theme-toggle" class="theme-btn">
            🌙 Dark Mode
        </button>
        <div class='login-box'>
            <h1>NotesNest</h1>
            <h3>Capture. Organize. Succeed.</h3>
            <input id="nameId" type="text" placeholder="Email or Username">
            <input id="pwdId" type="password" placeholder="Password">
            <button class="login-btn">Log In</button>
            <div class="sign-up-section">
                <p>Don't have account?</p> <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>
</body>

</html>
