<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Notes App</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>

<body>


    <section class="hero">
        <nav>
            <div class="brand">
                <img src="assets/logo.png" width="40px">
                <h1>NotesNest</h1>
            </div>
            <button class="add-btn">+</button>
            <button id="theme-toggle" class="theme-btn">
                🌙 Dark Mode
            </button>
            <a id="log-out-btn" href="login.html">Log out</a>
        </nav>


        <section class="content">
            <div class="notes-container"></div>
        </section>


        <dialog class="note-form" id="note-form">
            <div class="note-form-content">
                <input id="titleId" type="text" placeholder="Enter note title">
                <textarea id="notesId" placeholder="Write your notes"></textarea>
                <div class="CTA-form">
                    <button type="button" class="save-btn">Save</button>
                    <but ton type="button" class="cancel-btn">Cancel</button>
                </div>
            </div>
        </dialog>
    </section>


    <footer>
        @Codesmasher 2026 made with HTML, CSS and Vanilla JS
    </footer>
</body>

</html>
